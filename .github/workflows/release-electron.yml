name: Release Electron

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build packages
        run: npm run build

  build-electron:
    name: Build ${{ matrix.label }}
    needs: verify
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Package Electron app
        working-directory: packages/electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist -- --publish never

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v6
        with:
          name: electron-${{ matrix.label }}
          path: packages/electron/release
          if-no-files-found: error

  publish:
    name: Publish release
    needs: build-electron
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download Electron artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          mapfile -d '' files < <(find release-assets -type f -print0 | sort -z)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${files[@]}" --repo "$GH_REPO" --clobber
          else
            gh release create "$RELEASE_TAG" "${files[@]}" \
              --repo "$GH_REPO" \
              --generate-notes \
              --title "$RELEASE_TAG" \
              --verify-tag
          fi
